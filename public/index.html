<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeOS Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #1a1a2e;
        }
        
        h1 {
            font-size: 2.5rem;
            color: #4a9eff;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
            font-size: 1.1rem;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: #16161f;
            border: 1px solid #1a1a2e;
            border-radius: 12px;
            padding: 24px;
            transition: border-color 0.3s;
        }
        
        .card:hover {
            border-color: #4a9eff;
        }
        
        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #1a1a2e;
        }
        
        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #fff;
            margin-left: 10px;
        }
        
        .card-icon {
            font-size: 1.8rem;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1a1a2e;
        }
        
        .metric:last-child {
            border-bottom: none;
        }
        
        .metric-label {
            color: #888;
            font-size: 0.95rem;
        }
        
        .metric-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #4a9eff;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #1a1a2e;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a9eff, #00d4ff);
            transition: width 0.3s;
        }
        
        .progress-fill.complete {
            background: linear-gradient(90deg, #00ff88, #00cc66);
        }
        
        .progress-fill.warning {
            background: linear-gradient(90deg, #ffaa00, #ff8800);
        }
        
        .progress-fill.danger {
            background: linear-gradient(90deg, #ff4444, #cc0000);
        }
        
        .task-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #1a1a2e;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .task-item:hover {
            background: #20202e;
        }
        
        .task-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #4a9eff;
            border-radius: 4px;
            margin-right: 12px;
            flex-shrink: 0;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .task-checkbox.done {
            background: #4a9eff;
        }
        
        .task-content {
            flex: 1;
        }
        
        .task-title {
            color: #fff;
            font-size: 1rem;
        }
        
        .task-meta {
            color: #666;
            font-size: 0.85rem;
            margin-top: 4px;
        }
        
        .task-priority {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            flex-shrink: 0;
        }
        
        .task-priority.high { background: #ff4444; }
        .task-priority.medium { background: #ffaa00; }
        .task-priority.low { background: #666; }
        
        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px 20px;
            font-size: 1.1rem;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .error {
            background: #3a1a1a;
            border: 1px solid #ff4444;
            padding: 16px;
            border-radius: 8px;
            color: #ff8888;
            margin-bottom: 20px;
        }
        
        .score {
            font-size: 3rem;
            font-weight: 700;
            text-align: center;
            margin: 20px 0;
            background: linear-gradient(135deg, #4a9eff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .links {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .link-btn {
            padding: 10px 20px;
            background: #1a1a2e;
            border: 1px solid #4a9eff;
            border-radius: 8px;
            color: #4a9eff;
            text-decoration: none;
            transition: all 0.3s;
            font-size: 0.95rem;
        }
        
        .link-btn:hover {
            background: #4a9eff;
            color: #fff;
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🦞 LifeOS</h1>
            <div class="subtitle">Data-Driven Life Dashboard</div>
        </header>
        
        <div class="grid">
            <!-- Nutrition Card -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">🍽️</span>
                    <h2 class="card-title">Nutrition Today</h2>
                </div>
                <div id="nutrition-content" class="loading">Loading nutrition data...</div>
            </div>
            
            <!-- Tasks Card -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">📋</span>
                    <h2 class="card-title">Tasks</h2>
                </div>
                <div id="tasks-content" class="loading">Loading tasks...</div>
            </div>
            
            <!-- Health Metrics Card -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">💓</span>
                    <h2 class="card-title">Health Metrics</h2>
                </div>
                <div id="health-content" class="loading">Loading health data...</div>
            </div>
        </div>
        
        <div class="links">
            <a href="system-map.html" class="link-btn">🗺️ System Map</a>
            <a href="calendar.html" class="link-btn">📅 Calendar</a>
            <a href="nutrition-poster.html" class="link-btn">🥗 Nutrition Poster</a>
        </div>
    </div>
    
    <script>
        // API base URL - auto-detect hostname (works localhost + Tailscale)
        const API_BASE = `http://${window.location.hostname}:5000/api`;
        
        // Parse nutrition data text into structured format
        function parseNutritionData(text) {
            if (!text || text.includes('No nutrition')) {
                return null;
            }
            
            const lines = text.split('\n');
            const data = { targets: {}, actual: {} };
            
            for (const line of lines) {
                if (line.includes('Protein:')) {
                    const match = line.match(/(\d+\.?\d*)g.*?(\d+\.?\d*)g/);
                    if (match) {
                        data.actual.protein = parseFloat(match[1]);
                        data.targets.protein = parseFloat(match[2]);
                    }
                }
                if (line.includes('Fat:')) {
                    const match = line.match(/(\d+\.?\d*)g.*?(\d+\.?\d*)g/);
                    if (match) {
                        data.actual.fat = parseFloat(match[1]);
                        data.targets.fat = parseFloat(match[2]);
                    }
                }
                if (line.includes('Carbs:')) {
                    const match = line.match(/(\d+\.?\d*)g.*?(\d+\.?\d*)g/);
                    if (match) {
                        data.actual.carbs = parseFloat(match[1]);
                        data.targets.carbs = parseFloat(match[2]);
                    }
                }
                if (line.includes('Calories:')) {
                    const match = line.match(/(\d+\.?\d*).*?(\d+\.?\d*)/);
                    if (match) {
                        data.actual.calories = parseFloat(match[1]);
                        data.targets.calories = parseFloat(match[2]);
                    }
                }
                if (line.includes('Water:')) {
                    const match = line.match(/(\d+\.?\d*)ml.*?(\d+\.?\d*)ml/);
                    if (match) {
                        data.actual.water = parseFloat(match[1]);
                        data.targets.water = parseFloat(match[2]);
                    }
                }
            }
            
            return data;
        }
        
        // Load nutrition data
        async function loadNutrition() {
            try {
                const response = await fetch(`${API_BASE}/nutrition/today`);
                const result = await response.json();
                
                if (result.error) {
                    throw new Error(result.error);
                }
                
                const data = parseNutritionData(result.data);
                const content = document.getElementById('nutrition-content');
                
                if (!data) {
                    content.innerHTML = '<div class="empty-state">No nutrition data logged today</div>';
                    return;
                }
                
                const metrics = [
                    { label: 'Protein', key: 'protein', unit: 'g' },
                    { label: 'Carbs', key: 'carbs', unit: 'g' },
                    { label: 'Fat', key: 'fat', unit: 'g' },
                    { label: 'Calories', key: 'calories', unit: 'kcal' },
                    { label: 'Water', key: 'water', unit: 'ml' }
                ];
                
                let totalPercent = 0;
                let count = 0;
                
                const html = metrics.map(m => {
                    const actual = data.actual[m.key] || 0;
                    const target = data.targets[m.key] || 1;
                    const percent = Math.min(Math.round((actual / target) * 100), 100);
                    
                    totalPercent += percent;
                    count++;
                    
                    let fillClass = '';
                    if (percent >= 90) fillClass = 'complete';
                    else if (percent >= 70) fillClass = '';
                    else if (percent >= 50) fillClass = 'warning';
                    else fillClass = 'danger';
                    
                    return `
                        <div class="metric">
                            <div>
                                <div class="metric-label">${m.label}</div>
                                <div class="progress-bar">
                                    <div class="progress-fill ${fillClass}" style="width: ${percent}%"></div>
                                </div>
                            </div>
                            <div class="metric-value">${actual}/${target}${m.unit}</div>
                        </div>
                    `;
                }).join('');
                
                const overallScore = Math.round(totalPercent / count);
                content.innerHTML = `<div class="score">${overallScore}%</div>` + html;
                
            } catch (error) {
                document.getElementById('nutrition-content').innerHTML = `
                    <div class="error">Failed to load: ${error.message}</div>
                `;
            }
        }
        
        // Load tasks
        async function loadTasks() {
            try {
                const response = await fetch(`${API_BASE}/tasks/summary`);
                const result = await response.json();
                
                if (result.error) {
                    throw new Error(result.error);
                }
                
                const content = document.getElementById('tasks-content');
                content.innerHTML = `<pre style="color: #e0e0e0; font-size: 0.95rem; line-height: 1.8;">${result.data}</pre>`;
                
            } catch (error) {
                document.getElementById('tasks-content').innerHTML = `
                    <div class="error">Failed to load: ${error.message}</div>
                `;
            }
        }
        
        // Load health metrics
        async function loadHealth() {
            try {
                const response = await fetch(`${API_BASE}/health/today`);
                const result = await response.json();
                
                if (result.error) {
                    throw new Error(result.error);
                }
                
                const content = document.getElementById('health-content');
                
                if (result.data.includes('No data')) {
                    content.innerHTML = '<div class="empty-state">No health data logged today</div>';
                    return;
                }
                
                // Parse health data
                const lines = result.data.split('\n');
                const metrics = [];
                
                for (const line of lines) {
                    const parts = line.split(' | ');
                    for (const part of parts) {
                        const [key, value] = part.split('=');
                        if (key && value) {
                            metrics.push({ label: key.trim(), value: value.trim() });
                        }
                    }
                }
                
                if (metrics.length === 0) {
                    content.innerHTML = '<div class="empty-state">No health data available</div>';
                    return;
                }
                
                const html = metrics.map(m => `
                    <div class="metric">
                        <div class="metric-label">${m.label}</div>
                        <div class="metric-value">${m.value}</div>
                    </div>
                `).join('');
                
                content.innerHTML = html;
                
            } catch (error) {
                document.getElementById('health-content').innerHTML = `
                    <div class="error">Failed to load: ${error.message}</div>
                `;
            }
        }
        
        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', () => {
            loadNutrition();
            loadTasks();
            loadHealth();
            
            // Refresh every 5 minutes
            setInterval(() => {
                loadNutrition();
                loadTasks();
                loadHealth();
            }, 5 * 60 * 1000);
        });
    </script>
</body>
</html>
