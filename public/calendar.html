<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>LifeOS — Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-hover: #1a1a26;
      --border: #1e1e2e;
      --border-light: #2a2a3e;
      --text: #e4e4ef;
      --text-dim: #6e6e8a;
      --text-muted: #3e3e56;
      --accent: #6366f1;
      --accent-dim: rgba(99,102,241,0.12);
      --today: #22d3ee;
      --today-dim: rgba(34,211,238,0.08);
      --birthday: #f472b6;
      --event: #818cf8;
      --bill: #fb923c;
      --wedding: #e879f9;
      --health: #34d399;
      --recurring: #94a3b8;
      --font: 'DM Sans', -apple-system, sans-serif;
      --mono: 'DM Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 24px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .header h1 span {
      color: var(--accent);
    }

    .view-toggle {
      display: flex;
      gap: 2px;
      background: var(--surface);
      border-radius: 8px;
      padding: 3px;
      border: 1px solid var(--border);
    }

    .view-toggle button {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .view-toggle button.active {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .view-toggle button:hover:not(.active) {
      color: var(--text);
    }

    /* ── Month Navigation ── */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 20px 24px 12px;
    }

    .month-nav button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      width: 36px;
      height: 36px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
    }

    .month-nav button:hover {
      background: var(--surface-hover);
      color: var(--text);
      border-color: var(--border-light);
    }

    .month-title {
      text-align: center;
      min-width: 200px;
    }

    .month-title .month {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .month-title .year {
      font-size: 13px;
      color: var(--text-dim);
      font-weight: 500;
      margin-top: 2px;
    }

    .today-btn {
      position: absolute;
      right: 24px;
      background: none;
      border: 1px solid var(--today);
      color: var(--today);
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      opacity: 0;
      transition: all 0.2s;
      pointer-events: none;
    }

    .today-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .today-btn:hover {
      background: var(--today-dim);
    }

    /* ── Calendar Grid ── */
    .cal-container {
      padding: 8px 16px 24px;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      padding: 0 4px;
      margin-bottom: 4px;
    }

    .weekday {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 8px 0;
    }

    .weekday:nth-child(6), .weekday:nth-child(7) {
      color: var(--accent);
      opacity: 0.4;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      padding: 0 4px;
    }

    .day-cell {
      aspect-ratio: 1;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 4px 4px;
      position: relative;
      cursor: default;
      transition: all 0.15s;
      min-height: 0;
    }

    .day-cell:not(.empty):hover {
      background: var(--surface-hover);
    }

    .day-cell.other-month .day-num {
      color: var(--text-muted);
    }

    .day-cell .day-num {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dim);
      line-height: 1;
      z-index: 1;
    }

    .day-cell.today {
      background: var(--today-dim);
      border: 1px solid rgba(34,211,238,0.2);
    }

    .day-cell.today .day-num {
      color: var(--today);
      font-weight: 700;
    }

    .day-cell.has-events {
      cursor: pointer;
    }

    .day-cell.has-events .day-num {
      color: var(--text);
    }

    /* Event dots */
    .event-dots {
      display: flex;
      gap: 3px;
      margin-top: 4px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 100%;
    }

    .event-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .event-dot.birthday { background: var(--birthday); }
    .event-dot.event { background: var(--event); }
    .event-dot.bill { background: var(--bill); }
    .event-dot.wedding { background: var(--wedding); }
    .event-dot.health { background: var(--health); }
    .event-dot.recurring { background: var(--recurring); }
    .event-dot.other { background: var(--text-dim); }

    /* ── Event Details Panel ── */
    .event-panel {
      margin: 0 20px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: all 0.3s ease;
    }

    .event-panel.open {
      max-height: 600px;
      opacity: 1;
    }

    .event-panel-header {
      padding: 16px 20px 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }

    .event-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 20px;
      transition: background 0.15s;
    }

    .event-item:hover {
      background: var(--surface-hover);
    }

    .event-type-badge {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }

    .event-info {
      flex: 1;
      min-width: 0;
    }

    .event-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .event-meta {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
      display: flex;
      gap: 12px;
    }

    .event-cost {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--bill);
      white-space: nowrap;
    }

    /* ── List View ── */
    .list-view {
      padding: 8px 20px 24px;
      display: none;
    }

    .list-view.active { display: block; }
    .cal-container.hidden { display: none; }

    .list-month-header {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 16px 0 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    .list-event {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .list-event:last-child { border-bottom: none; }

    .list-date {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-dim);
      min-width: 48px;
      text-align: right;
    }

    .list-date.today-date {
      color: var(--today);
      font-weight: 600;
    }

    .list-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .list-title {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
    }

    .list-cost {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--bill);
      font-weight: 500;
    }

    /* ── Legend ── */
    .legend {
      display: flex;
      gap: 16px;
      padding: 12px 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* ── Month Cost Summary ── */
    .month-summary {
      display: flex;
      justify-content: center;
      gap: 24px;
      padding: 8px 24px 16px;
      font-family: var(--mono);
      font-size: 13px;
    }

    .month-summary .stat {
      color: var(--text-dim);
    }

    .month-summary .stat strong {
      color: var(--text);
      font-weight: 600;
    }

    /* ── Loading ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 50vh;
      color: var(--text-dim);
      font-size: 14px;
    }

    .loading::after {
      content: '';
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin-left: 10px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .month-title .month { font-size: 22px; }
      .day-cell .day-num { font-size: 12px; }
      .day-cell { padding: 4px 2px 2px; border-radius: 8px; }
      .event-dot { width: 5px; height: 5px; }
      .header { padding: 16px 16px 0; }
      .cal-container { padding: 8px 8px 16px; }
      .legend { gap: 10px; padding: 12px 16px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1><span>◆</span> LifeOS Calendar</h1>
    <div class="view-toggle">
      <button class="active" data-view="month">Lună</button>
      <button data-view="list">Listă</button>
    </div>
  </div>

  <div class="month-nav" style="position:relative;">
    <button id="prev-month">‹</button>
    <div class="month-title">
      <div class="month" id="month-name"></div>
      <div class="year" id="year-label"></div>
    </div>
    <button id="next-month">›</button>
    <button class="today-btn" id="today-btn">Azi</button>
  </div>

  <div class="month-summary" id="month-summary"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--birthday)"></div>Birthday</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--wedding)"></div>Nuntă</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--bill)"></div>Bill</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--event)"></div>Event</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--health)"></div>Health</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--recurring)"></div>Recurring</div>
  </div>

  <div class="cal-container" id="cal-container">
    <div class="weekdays">
      <div class="weekday">Lun</div>
      <div class="weekday">Mar</div>
      <div class="weekday">Mie</div>
      <div class="weekday">Joi</div>
      <div class="weekday">Vin</div>
      <div class="weekday">Sâm</div>
      <div class="weekday">Dum</div>
    </div>
    <div class="days-grid" id="days-grid"></div>
  </div>

  <div class="event-panel" id="event-panel"></div>

  <div class="list-view" id="list-view"></div>

<script>
const API = 'http://127.0.0.1:8000';
const MONTHS_RO = ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];

let allEvents = [];
let currentYear, currentMonth; // 0-indexed month
let selectedDay = null;
let currentView = 'month';

const todayDate = new Date();
const todayStr = todayDate.toISOString().slice(0, 10);

function getTypeColor(type, title) {
  const t = (type || '').toLowerCase();
  const tl = (title || '').toLowerCase();
  if (t === 'birthday' || tl.includes('🎂') || tl.includes('ziua')) return 'birthday';
  if (t === 'wedding' || tl.includes('nuntă') || tl.includes('nunta')) return 'wedding';
  if (t === 'bill' || tl.includes('taxe') || tl.includes('asigurare') || tl.includes('rate')) return 'bill';
  if (t === 'health' || tl.includes('semi-marathon') || tl.includes('fizioterapeut') || tl.includes('itp')) return 'health';
  if (t === 'recurring') return 'recurring';
  return 'event';
}

function formatCost(cost, currency) {
  if (!cost || cost === 0) return '';
  return `${cost} ${currency || 'lei'}`;
}

async function loadEvents() {
  try {
    const res = await fetch(`${API}/api/calendar/all`);
    const data = await res.json();
    allEvents = data.events || [];
  } catch (e) {
    console.error('Failed to load events:', e);
    allEvents = [];
  }
}

function getEventsForDate(dateStr) {
  return allEvents.filter(e => e.date === dateStr);
}

function getEventsForMonth(year, month) {
  const prefix = `${year}-${String(month + 1).padStart(2, '0')}`;
  return allEvents.filter(e => e.date && e.date.startsWith(prefix));
}

function renderCalendar() {
  const grid = document.getElementById('days-grid');
  const monthName = document.getElementById('month-name');
  const yearLabel = document.getElementById('year-label');
  const todayBtn = document.getElementById('today-btn');

  monthName.textContent = MONTHS_RO[currentMonth];
  yearLabel.textContent = currentYear;

  // Show "Azi" button if not viewing current month
  const isCurrentMonth = currentYear === todayDate.getFullYear() && currentMonth === todayDate.getMonth();
  todayBtn.classList.toggle('visible', !isCurrentMonth);

  // First day of month (0=Sun, adjust to Mon=0)
  const firstDay = new Date(currentYear, currentMonth, 1);
  let startDow = firstDay.getDay() - 1;
  if (startDow < 0) startDow = 6;

  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const daysInPrev = new Date(currentYear, currentMonth, 0).getDate();

  // Month cost summary
  const monthEvents = getEventsForMonth(currentYear, currentMonth);
  const totalCost = monthEvents.reduce((s, e) => s + (e.cost || 0), 0);
  const eventCount = monthEvents.length;
  document.getElementById('month-summary').innerHTML = `
    <span class="stat"><strong>${eventCount}</strong> events</span>
    ${totalCost > 0 ? `<span class="stat"><strong>${totalCost}</strong> lei planificat</span>` : ''}
  `;

  let html = '';
  const totalCells = Math.ceil((startDow + daysInMonth) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    const dayNum = i - startDow + 1;
    
    if (dayNum < 1) {
      // Previous month
      const d = daysInPrev + dayNum;
      html += `<div class="day-cell other-month"><span class="day-num">${d}</span></div>`;
    } else if (dayNum > daysInMonth) {
      // Next month
      const d = dayNum - daysInMonth;
      html += `<div class="day-cell other-month"><span class="day-num">${d}</span></div>`;
    } else {
      const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(dayNum).padStart(2, '0')}`;
      const events = getEventsForDate(dateStr);
      const isToday = dateStr === todayStr;
      const classes = ['day-cell'];
      if (isToday) classes.push('today');
      if (events.length > 0) classes.push('has-events');

      let dots = '';
      if (events.length > 0) {
        dots = '<div class="event-dots">' +
          events.slice(0, 4).map(e => 
            `<div class="event-dot ${getTypeColor(e.type, e.title)}"></div>`
          ).join('') +
          (events.length > 4 ? `<span style="font-size:9px;color:var(--text-muted)">+${events.length-4}</span>` : '') +
          '</div>';
      }

      html += `<div class="${classes.join(' ')}" data-date="${dateStr}" onclick="selectDay('${dateStr}')">
        <span class="day-num">${dayNum}</span>
        ${dots}
      </div>`;
    }
  }

  grid.innerHTML = html;
  closePanel();
}

function selectDay(dateStr) {
  const events = getEventsForDate(dateStr);
  if (events.length === 0) { closePanel(); return; }

  selectedDay = dateStr;
  const panel = document.getElementById('event-panel');
  const d = new Date(dateStr + 'T12:00:00');
  const dayName = d.toLocaleDateString('ro-RO', { weekday: 'long', day: 'numeric', month: 'long' });

  let html = `<div class="event-panel-header">${dayName}</div>`;
  events.forEach(e => {
    const color = getTypeColor(e.type, e.title);
    const cost = formatCost(e.cost, e.currency);
    html += `<div class="event-item">
      <div class="event-type-badge" style="background:var(--${color})"></div>
      <div class="event-info">
        <div class="event-title">${e.title}</div>
        <div class="event-meta">
          ${e.type ? `<span>${e.type}</span>` : ''}
          ${e.location ? `<span>📍 ${e.location}</span>` : ''}
          ${e.notes ? `<span>${e.notes}</span>` : ''}
        </div>
      </div>
      ${cost ? `<div class="event-cost">${cost}</div>` : ''}
    </div>`;
  });

  panel.innerHTML = html;
  panel.classList.add('open');
}

function closePanel() {
  document.getElementById('event-panel').classList.remove('open');
  selectedDay = null;
}

function renderListView() {
  const listEl = document.getElementById('list-view');
  const monthEvents = getEventsForMonth(currentYear, currentMonth);
  
  if (monthEvents.length === 0) {
    listEl.innerHTML = `<div style="text-align:center;color:var(--text-muted);padding:40px 0;font-size:14px;">Niciun event în ${MONTHS_RO[currentMonth]}</div>`;
    return;
  }

  // Sort by date
  monthEvents.sort((a, b) => a.date.localeCompare(b.date));

  let html = `<div class="list-month-header">${MONTHS_RO[currentMonth]} ${currentYear} — ${monthEvents.length} events</div>`;
  monthEvents.forEach(e => {
    const day = parseInt(e.date.split('-')[2]);
    const color = getTypeColor(e.type, e.title);
    const cost = formatCost(e.cost, e.currency);
    const isToday = e.date === todayStr;

    html += `<div class="list-event">
      <div class="list-date ${isToday ? 'today-date' : ''}">${day}</div>
      <div class="list-dot" style="background:var(--${color})"></div>
      <div class="list-title">${e.title}</div>
      ${cost ? `<div class="list-cost">${cost}</div>` : ''}
    </div>`;
  });

  listEl.innerHTML = html;
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
  document.getElementById('cal-container').classList.toggle('hidden', view !== 'month');
  document.getElementById('event-panel').classList.toggle('hidden', view !== 'month');
  document.getElementById('list-view').classList.toggle('active', view === 'list');
  if (view === 'list') renderListView();
}

// Navigation
document.getElementById('prev-month').onclick = () => {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
  if (currentView === 'list') renderListView();
};

document.getElementById('next-month').onclick = () => {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderCalendar();
  if (currentView === 'list') renderListView();
};

document.getElementById('today-btn').onclick = () => {
  currentYear = todayDate.getFullYear();
  currentMonth = todayDate.getMonth();
  renderCalendar();
  if (currentView === 'list') renderListView();
};

document.querySelectorAll('.view-toggle button').forEach(b => {
  b.onclick = () => switchView(b.dataset.view);
});

// Init
async function init() {
  currentYear = todayDate.getFullYear();
  currentMonth = todayDate.getMonth();
  
  document.getElementById('days-grid').innerHTML = '<div class="loading" style="grid-column:1/-1">Se încarcă</div>';
  
  await loadEvents();
  renderCalendar();
}

init();
</script>
</body>
</html>
